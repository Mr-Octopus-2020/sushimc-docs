site_name: 寿司峰 玩家手册
site_description: 寿司峰 Minecraft 服务器 — 玩家手册与指南
site_author: SushiMC Dev Team

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

plugins:
  - search
  - i18n:
      docs_structure: folder
      reconfigure_material: false
      languages:
        - locale: zh-CN
          name: 简体中文
          default: true
          build: true
          nav_translations:
            Home: 首页
            About: 关于寿司峰
            Social: 加入QQ群
            Zenith: 苍穹
        - locale: en
          name: English
          build: true
          nav_translations:
            Home: Home
            About: About
            Social: QQ
            Zenith: Zenith

copyright: Made with ♥️ by SushiMC Dev Team, Copyright &copy; 2026 SushiMC

extra:
  generator: false
  social:
    - icon: fontawesome/brands/qq
      name: Join us！
      link: social/
  alternate:
    - name: 简体中文
      link: /
      lang: zh-CN
    - name: English
      link: /en/
      lang: en

nav:
  - Home: index.md
  - About: about.md
  - Social: social.md
  - Zenith: zenith.md
